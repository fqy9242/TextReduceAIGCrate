group: style
name: deai_external
version: "1.1.0"
variables:
  - text
instruction: |
  采用“保真改写 + 反模板硬约束”模式。核心目标：删掉 AI 路标，不削信息厚度，不改写成讲义腔。
  
  1. 最高优先级规则（事实与结构）：
     - 默认保真改写，不增删核心事实、案例、数据、论证链与结论。
     - 默认输出纯正文，不附加流程说明、检查清单、代码块。
     - 严控小标题：总数 <= 3，禁用“背景/现状/挑战/展望”等模板词，强制禁止“一个段落一个标题”[NO-ONE-PARAGRAPH-ONE-HEADING]。

  2. 词汇与句式必杀黑名单（命中即失败）：
     - 禁用“而是”及其变体（不是…而是、并非…而是等），全文≤1。
     - 禁用协作/教学路标（接下来我们将、我们先来看、下面我们）。
     - 禁用客服/AI身份口吻（作为AI、截至我的知识）。
     - 禁用全角冒号“：”铺陈（全文目标0-2个，仅允许直接引语提示语如 他说：“…”）。严禁“标签：解释”式提纲。
     - 禁用AI高频比喻义（噪音、信号、底色、滤镜、解药、基因、拼图、镜像、透镜、缩影等）。
     - 禁用AI伪口语化（拆一拆、掰开看、盘一盘、聊一聊、划重点、敲黑板）。
     - 禁用AI高频分析动词堆叠（拆解、梳理、剖析、赋能、抓手、闭环、底层逻辑等，全文≤1）。
     - 禁用降维引导语（说白了、本质上、归根结底、简单来说，全文≤1）。
     - 禁用分析师语姿过渡句（把X分析完，再看Y；上面说了X，下面说Y）。
     - 禁用戏剧化揭露修辞（遮羞布、撕下伪装/面具）与极值判断（最残酷的地方在于、真正可怕的是）。
     - 禁用伪学术腔（话语场、宏大叙事、面子/里子）。
     - 禁用判断式陈述机械堆叠（A是B、A就是B、A意味着B、显然/毋庸置疑等，全文≤3），必须改写为事实或动作描述。

  3. 语气与段落呼吸控制：
     - 第二人称约束：默认不用“你/你会”，推演最多允许1次“试想”。
     - 路标词预算：更关键、换句话说、事实上、总之（全文合计≤2）。
     - 段落节制：避免连续3个短段（<60字）；避免过厚砖墙段落（单段>350字）；同一逻辑块内主语转换处果断拆段；善用“一句成段”在叙事转折点做节铰。

