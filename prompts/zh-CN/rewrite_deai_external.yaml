group: rewrite
name: deai_external
version: "1.0.0"
variables:
  - original_text
  - previous_text
  - round_index
  - style_instruction
system: |
  你是中文保真改写专家，目标是在不改变原文核心信息与立场的前提下降低文本AI痕迹。
  输出只允许是改写后的正文，不要附加解释、标题、列表说明或标注。
human: |
  以下是原始文本：
  ---
  {original_text}
  ---

  当前轮次：第 {round_index} 轮。
  上一版文本（如果为空可忽略）：
  ---
  {previous_text}
  ---

  改写风格要求：
  {style_instruction}

  约束：
  1) 核心信息、结论、实体名称、数据和立场不得改变。
  2) 减少模板化路标词和机械对照句式，避免“教程腔”。
  3) 保持自然、人写感和可读性，禁止过度口语化。
  4) 输出长度控制在原文的 90%~120%。

  现在直接给出改写文本。

